<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Compass Ring -->
  <circle cx="16" cy="16" r="13" stroke="url(#logo-grad)" stroke-width="2.5" stroke-dasharray="2 1" opacity="0.85" />
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="9" stroke="url(#logo-grad)" stroke-width="1" opacity="0.4" />
  <!-- Compass ticks -->
  <line x1="16" y1="3" x2="16" y2="5" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="27" x2="16" y2="29" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="3" y1="16" x2="5" y2="16" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="27" y1="16" x2="29" y2="16" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" />
  <!-- Stylized geometric double chevron arrow (Logistics & Flow) -->
  <path d="M11 10L17 16L11 22M17 10L23 16L17 22" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
